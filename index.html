<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="暗算">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<title>暗算トレーナー</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #273549;
    --text: #e2e8f0;
    --sub: #94a3b8;
    --accent: #38bdf8;
    --accent2: #a78bfa;
    --ok: #4ade80;
    --ng: #f87171;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button, input { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
  header { display: flex; align-items: baseline; gap: 12px; margin: 8px 0 16px; }
  header h1 { font-size: 22px; margin: 0; }
  header .sub { color: var(--sub); font-size: 13px; }
  nav { display: flex; gap: 8px; margin-bottom: 16px; }
  nav button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--sub); font-size: 15px; cursor: pointer;
  }
  nav button.active { background: var(--accent); border-color: var(--accent); color: #082f49; font-weight: 700; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 14px;
  }
  .card h2 { margin: 0 0 12px; font-size: 17px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .row .label { width: 100%; color: var(--sub); font-size: 13px; margin-bottom: 2px; }
  .chip {
    padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); cursor: pointer; font-size: 14px;
  }
  .chip.sel { background: var(--accent2); border-color: var(--accent2); color: #1e1b4b; font-weight: 700; }
  .start-btn, .next-btn {
    width: 100%; padding: 14px; font-size: 17px; font-weight: 700;
    border: none; border-radius: 12px; background: var(--accent); color: #082f49; cursor: pointer;
  }
  .next-btn { background: var(--accent2); color: #1e1b4b; }
  /* quiz */
  .quiz-top { display: flex; justify-content: space-between; color: var(--sub); font-size: 14px; margin-bottom: 6px; }
  .progressbar { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .progressbar div { height: 100%; background: var(--accent); transition: width .2s; }
  .qtext { font-size: 30px; text-align: center; margin: 24px 0; line-height: 1.5; }
  .qtext.small { font-size: 20px; }
  .qtext sup { font-size: 60%; }
  .answer-row { display: flex; gap: 8px; }
  .answer-row input {
    flex: 1; min-width: 0; padding: 12px 14px; font-size: 20px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card2); color: var(--text);
  }
  .answer-row input:focus { outline: 2px solid var(--accent); }
  .answer-row button {
    flex-shrink: 0; padding: 12px 20px; font-size: 16px; font-weight: 700; border: none;
    border-radius: 10px; background: var(--accent); color: #082f49; cursor: pointer;
  }
  .unit { align-self: center; color: var(--sub); font-size: 16px; flex-shrink: 0; }
  .hint { color: var(--sub); font-size: 12px; margin-top: 8px; }
  .feedback { text-align: center; margin: 16px 0; font-size: 18px; }
  .feedback .mark { font-size: 40px; display: block; margin-bottom: 6px; }
  .feedback.ok .mark { color: var(--ok); }
  .feedback.ng .mark { color: var(--ng); }
  .note { background: var(--card2); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: var(--text); margin: 12px 0; line-height: 1.7; }
  .note b { color: var(--accent); }
  /* result */
  .score-big { font-size: 42px; text-align: center; margin: 10px 0; font-weight: 700; }
  .score-sub { text-align: center; color: var(--sub); margin-bottom: 16px; }
  .review { font-size: 14px; }
  .review div { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 10px; }
  .review .q { color: var(--sub); }
  .r-ok { color: var(--ok); } .r-ng { color: var(--ng); }
  /* stats */
  .statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
  .stat { background: var(--card2); border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat .k { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .chart-wrap { overflow-x: auto; }
  table.sess { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.sess th, table.sess td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  table.sess th { color: var(--sub); font-weight: normal; }
  .muted { color: var(--sub); font-size: 14px; }
  .danger { background: none; border: 1px solid var(--border); color: var(--sub); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🧮 暗算トレーナー</h1>
    <span class="sub">暗算・近似計算の練習</span>
  </header>
  <nav>
    <button id="tab-mental" class="active">暗算</button>
    <button id="tab-approx">近似計算</button>
    <button id="tab-stats">進捗</button>
  </nav>
  <main id="main"></main>
</div>

<script>
"use strict";

// ---------- storage ----------
const STORE_KEY = "anzanTrainerV1";
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { sessions: [], bestStreak: 0 }; }
  catch { return { sessions: [], bestStreak: 0 }; }
}
function saveStore(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

// ---------- helpers ----------
const $ = sel => document.querySelector(sel);
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[rand(0, arr.length - 1)]; }
function sup(n) { return `<sup>${n}</sup>`; }
function sci(m, e) { return `${m}×10${sup(e)}`; }

// format a number for display (2-3 sig figs, scientific if large/small)
function fmt(v) {
  if (v === 0) return "0";
  const a = Math.abs(v);
  if (a >= 1e5 || a < 1e-2) {
    const e = Math.floor(Math.log10(a));
    let m = v / Math.pow(10, e);
    m = Math.round(m * 100) / 100;
    return `${m}×10${sup(e)}`;
  }
  const r = Math.round(v * 1000) / 1000;
  return r.toLocaleString("ja-JP", { maximumFractionDigits: 3 });
}

// parse user numeric input: "1234", "2.4e9", "2.4×10^9", "3*10^5", "10^7"
function parseNum(s) {
  s = String(s).trim().replace(/,/g, "").replace(/\s+/g, "").replace(/－/g,"-").replace(/．/g,".");
  s = s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  if (s === "") return NaN;
  if (/^-?\d*\.?\d+$/.test(s)) return parseFloat(s);
  let m = s.match(/^(-?\d*\.?\d+)[eE]([+-]?\d+)$/);
  if (m) return parseFloat(m[1]) * Math.pow(10, parseInt(m[2]));
  m = s.match(/^(-?\d*\.?\d+)[×xX*]10\^?([+-]?\d+)$/);
  if (m) return parseFloat(m[1]) * Math.pow(10, parseInt(m[2]));
  m = s.match(/^-?10\^([+-]?\d+)$/);
  if (m) return (s.startsWith("-") ? -1 : 1) * Math.pow(10, parseInt(m[1]));
  return NaN;
}

// ---------- mental math tips ----------
function mulTip(a, b, ans) {
  const ta = Math.floor(a / 10), ua = a % 10;
  const tb = Math.floor(b / 10), ub = b % 10;
  if (a >= 10 && b >= 10) {
    // インド式: 十の位が同じ・一の位の和が10
    if (ta === tb && ua + ub === 10)
      return `十の位が同じ＆一の位の和が10 →「${ta}×${ta + 1}=${ta * (ta + 1)}」と「${ua}×${ub}=${String(ua * ub).padStart(2, "0")}」を並べて <b>${ans}</b>（インド式）`;
    // 11〜19どうし
    if (a <= 19 && b <= 19)
      return `11〜19どうし: ${a}+${ub}=${a + ub} を10倍して ${(a + ub) * 10}、一の位どうし ${ua}×${ub}=${ua * ub} を足して <b>${ans}</b>`;
    // 差が2 → 和と差の積
    if (Math.abs(a - b) === 2) {
      const m = (a + b) / 2;
      return `${Math.max(a,b)}×${Math.min(a,b)} = ${m}² − 1 = ${m * m} − 1 = <b>${ans}</b>（和と差の積）`;
    }
    // 100近傍（不足分の積が2桁に収まるときだけ、桁の並べ方がそのまま使える）
    if (a >= 85 && b >= 85 && (100 - a) * (100 - b) < 100) {
      const d1 = 100 - a, d2 = 100 - b;
      return `100からの不足は ${d1} と ${d2} → 前半 ${a}−${d2}=${a - d2}、後半 ${d1}×${d2}=${String(d1 * d2).padStart(2, "0")} で <b>${ans}</b>（100近傍の術）`;
    }
    // 一の位が0/9/1のときの丸めテク（bに寄せる）
    let x = a, y = b;
    if (a % 10 === 0 || a % 10 === 9 || a % 10 === 1) { x = b; y = a; }
    const ty = Math.floor(y / 10), uy = y % 10;
    if (uy === 0) return `${x}×${y} = ${x}×${ty}×10 = ${x * ty}×10 = <b>${ans}</b>`;
    if (uy === 9) return `${x}×${y} = ${x}×${y + 1} − ${x} = ${x * (y + 1)} − ${x} = <b>${ans}</b>`;
    if (uy === 1) return `${x}×${y} = ${x}×${ty}×10 + ${x} = ${x * ty * 10} + ${x} = <b>${ans}</b>`;
    // デフォルト: 分配法則
    return `${x}×${y} = ${x}×${ty * 10} + ${x}×${uy} = ${x * ty * 10} + ${x * uy} = <b>${ans}</b>（分配法則）`;
  }
  if (a < 10 && b < 10) return `九九は反射で出るまで反復あるのみ！`;
  const big = a >= 10 ? a : b, sm = a >= 10 ? b : a;
  if (big % 10 === 0) return `${big}×${sm} = ${big / 10}×${sm}×10 = ${(big / 10) * sm}×10 = <b>${ans}</b>`;
  if (sm === 9) return `${big}×9 = ${big}×10 − ${big} = ${big * 10} − ${big} = <b>${ans}</b>`;
  if (sm === 5) return `${big}×5 = ${big}×10 ÷ 2 = ${big * 10}÷2 = <b>${ans}</b>`;
  const tbig = Math.floor(big / 10) * 10, ubig = big % 10;
  return `${big}×${sm} = ${tbig}×${sm} + ${ubig}×${sm} = ${tbig * sm} + ${ubig * sm} = <b>${ans}</b>（分配法則）`;
}

function addTip(a, b, ans) {
  const ub = b % 10, ua = a % 10;
  if (ub >= 7) {
    const r = 10 - ub;
    return `${b} を ${b + r} に丸めて ${a}+${b + r}=${a + b + r}、足しすぎた ${r} を引いて <b>${ans}</b>`;
  }
  if (ua >= 7) {
    const r = 10 - ua;
    return `${a} を ${a + r} に丸めて ${a + r}+${b}=${a + b + r}、足しすぎた ${r} を引いて <b>${ans}</b>`;
  }
  const taP = Math.floor(a / 10) * 10, tbP = Math.floor(b / 10) * 10;
  return `キリのいい部分と端数に分ける: (${taP}+${tbP}) + (${ua}+${ub}) = ${taP + tbP} + ${ua + ub} = <b>${ans}</b>`;
}

function subTip(a, b, ans) {
  const ub = b % 10, ua = a % 10;
  if (ub > ua) {
    const r = 10 - ub;
    return `${b} を ${b + r} に丸めて引く: ${a}−${b + r}=${a - b - r}、引きすぎた ${r} を戻して <b>${ans}</b>（繰り下がり回避）`;
  }
  const tbP = Math.floor(b / 10) * 10;
  return `十の位から先に: ${a}−${tbP}=${a - tbP}、そこから ${ub} を引いて <b>${ans}</b>`;
}

function divTip(a, b, q) {
  if (q < 10) return `九九の逆: ${b}×${q} = ${a}`;
  const t = Math.floor(q / 10) * 10;
  return `見当をつける: ${b}×${t}=${b * t}。残り ${a - b * t} は ${b}×${q - t} → 合わせて <b>${q}</b>`;
}

// ---------- mental math problems ----------
function genMental(op, level) {
  let realOp = op === "mix" ? pick(["add","sub","mul","div"]) : op;
  let a, b, text, ans;
  let tip;
  if (realOp === "dd") { // 二桁の九九（2桁×2桁）
    if (level === "easy")   { a = rand(11, 19); b = rand(11, 19); }
    if (level === "normal") { a = rand(11, 49); b = rand(11, 49); }
    if (level === "hard")   { a = rand(11, 99); b = rand(11, 99); }
    ans = a * b;
    text = `${a} × ${b}`;
    return { text, ans, tip: mulTip(a, b, ans), isApprox: false };
  }
  if (realOp === "add" || realOp === "sub") {
    if (level === "easy")   { a = rand(10, 99); b = rand(2, 9); }
    if (level === "normal") { a = rand(10, 99); b = rand(10, 99); }
    if (level === "hard")   { a = rand(100, 999); b = rand(100, 999); }
    if (realOp === "sub" && b > a) [a, b] = [b, a];
    ans = realOp === "add" ? a + b : a - b;
    text = `${a} ${realOp === "add" ? "+" : "−"} ${b}`;
    tip = realOp === "add" ? addTip(a, b, ans) : subTip(a, b, ans);
  } else if (realOp === "mul") {
    if (level === "easy")   { a = rand(2, 9); b = rand(2, 9); }
    if (level === "normal") { a = rand(11, 99); b = rand(2, 9); }
    if (level === "hard")   { a = rand(11, 99); b = rand(11, 99); }
    ans = a * b;
    text = `${a} × ${b}`;
    tip = mulTip(a, b, ans);
  } else { // div — always exact
    let q;
    if (level === "easy")   { b = rand(2, 9); q = rand(2, 9); }
    if (level === "normal") { b = rand(2, 9); q = rand(11, 99); }
    if (level === "hard")   { b = rand(11, 29); q = rand(11, 99); }
    a = b * q; ans = q;
    text = `${a} ÷ ${b}`;
    tip = divTip(a, b, q);
  }
  return { text, ans, tip, isApprox: false };
}

// ---------- approximation problems ----------
function genNotation() {
  const kind = pick(["mul", "div", "sq"]);
  const m1 = rand(11, 99) / 10, e1 = rand(-4, 8);
  const m2 = rand(11, 99) / 10, e2 = rand(-4, 8);
  let text, ans;
  if (kind === "mul") {
    ans = m1 * Math.pow(10, e1) * m2 * Math.pow(10, e2);
    text = `${sci(m1, e1)} × ${sci(m2, e2)} ≈ ?`;
  } else if (kind === "div") {
    ans = (m1 * Math.pow(10, e1)) / (m2 * Math.pow(10, e2));
    text = `${sci(m1, e1)} ÷ ${sci(m2, e2)} ≈ ?`;
  } else {
    ans = Math.pow(m1 * Math.pow(10, e1), 2);
    text = `(${sci(m1, e1)})${sup(2)} ≈ ?`;
  }
  return { text, ans, tol: 1.3, unit: "", isApprox: true,
           note: `正確な値は <b>${fmt(ans)}</b>。仮数どうし・指数どうしを分けて計算するのがコツ。` };
}

const PHYS = [
  { q: "光が太陽から地球まで届く時間は約何秒？（距離 1.5×10¹¹ m、光速 3×10⁸ m/s）",
    ans: 500, unit: "s", tol: 1.5,
    note: "1.5×10¹¹ ÷ 3×10⁸ = 0.5×10³ = <b>500 s</b>（約8分20秒）" },
  { q: "光が地球を1周する時間は約何秒？（地球の円周 4×10⁷ m）",
    ans: 0.13, unit: "s", tol: 1.5,
    note: "4×10⁷ ÷ 3×10⁸ ≈ 1.3×10⁻¹ = <b>0.13 s</b>。1秒で7周半。" },
  { q: "1年は約何秒？",
    ans: 3.15e7, unit: "s", tol: 1.3,
    note: "365 × 24 × 3600 ≈ <b>3.15×10⁷ s</b>。「π×10⁷ 秒」と覚えると便利。" },
  { q: "音（340 m/s）が1 km進むのにかかる時間は約何秒？",
    ans: 2.9, unit: "s", tol: 1.3,
    note: "1000 ÷ 340 ≈ <b>3 s</b>。雷まで3秒なら約1km。" },
  { q: "質量1000 kgの車が20 m/s（72 km/h）で走るときの運動エネルギーは約何J？",
    ans: 2e5, unit: "J", tol: 1.5,
    note: "½mv² = 0.5 × 1000 × 400 = <b>2×10⁵ J</b>" },
  { q: "体重60 kgの人が高さ3 mから飛び降りたときの衝突エネルギーは約何J？（g≈10）",
    ans: 1800, unit: "J", tol: 1.5,
    note: "mgh = 60 × 10 × 3 = <b>1.8×10³ J</b>" },
  { q: "100 Wの電球を24時間つけたときの消費エネルギーは約何J？",
    ans: 8.6e6, unit: "J", tol: 1.5,
    note: "100 × 86400 ≈ <b>8.6×10⁶ J</b>（= 2.4 kWh）。1日 ≈ 8.6×10⁴ s は覚えておくと速い。" },
  { q: "水1 L（1 kg）を20℃から100℃まで温めるのに必要な熱量は約何J？（比熱 4200 J/kg·K）",
    ans: 3.4e5, unit: "J", tol: 1.5,
    note: "4200 × 80 ≈ <b>3.4×10⁵ J</b>" },
  { q: "自由落下で5秒間に落ちる距離は約何m？（g≈10）",
    ans: 125, unit: "m", tol: 1.3,
    note: "½gt² = 0.5 × 10 × 25 = <b>125 m</b>" },
  { q: "高さ20 mから物を落とすと地面に着くまで約何秒？（g≈10）",
    ans: 2, unit: "s", tol: 1.3,
    note: "t = √(2h/g) = √4 = <b>2 s</b>" },
  { q: "1気圧の大気が1 m²の面を押す力は約何N？",
    ans: 1e5, unit: "N", tol: 1.5,
    note: "1気圧 ≈ <b>10⁵ N/m²(Pa)</b>。約10トンの重さに相当。" },
  { q: "地球の周囲（赤道1周）の長さは約何m？",
    ans: 4e7, unit: "m", tol: 1.3,
    note: "<b>4×10⁷ m</b>（4万km）。メートルの定義の由来。" },
  { q: "人の心臓は1日に約何回打つ？（毎分70回として）",
    ans: 1e5, unit: "回", tol: 2,
    note: "70 × 60 × 24 ≈ <b>1×10⁵ 回</b>" },
  { q: "体重60 kgの人が富士山頂（標高3776 m）まで登るときに稼ぐ位置エネルギーは約何J？（g≈10）",
    ans: 2.3e6, unit: "J", tol: 1.5,
    note: "mgh ≈ 60 × 10 × 3800 ≈ <b>2.3×10⁶ J</b>（約540 kcal）" },
  { q: "時速250 kmの新幹線で東京–新大阪 550 kmは約何時間？",
    ans: 2.2, unit: "時間", tol: 1.3,
    note: "550 ÷ 250 = <b>2.2 時間</b>" },
  { q: "時速100 kmの車で地球1周（4万km）を走ると約何日かかる？",
    ans: 17, unit: "日", tol: 1.5,
    note: "40000 ÷ 100 = 400時間 ≈ <b>17 日</b>" },

  // --- 電磁気 ---
  { q: "1000 μF のコンデンサに 10 V かけたとき蓄えられる電荷は約何C？（Q=CV）",
    ans: 1e-2, unit: "C", tol: 1.3,
    note: "Q = CV = 10⁻³ × 10 = <b>10⁻² C</b>。μ（マイクロ）= 10⁻⁶。" },
  { q: "100 μF のコンデンサに 100 V かけたとき蓄えられるエネルギーは約何J？（½CV²）",
    ans: 0.5, unit: "J", tol: 1.3,
    note: "½CV² = 0.5 × 10⁻⁴ × 10⁴ = <b>0.5 J</b>" },

// pick a word-problem from a fixed list, avoiding repeats within a session
function genFromList(list, used) {
  let cand = list.filter(p => !used.has(p));
  if (cand.length === 0) { used.clear(); cand = list.slice(); }
  const p = pick(cand);
  used.add(p);
  return { text: p.q, ans: p.ans, tol: p.tol, unit: p.unit, note: p.note, isApprox: true, isPhysics: true };
}

// ---------- オーダー評価 ----------
function genOrder() {
  const kind = pick(["pow2val", "pow2ord", "compord"]);
  if (kind === "pow2val") {
    const n = rand(10, 64);
    const val = Math.pow(2, n);
    const approxExp = n * Math.LN2 / Math.LN10;
    return { text: `2${sup(n)} ≈ ?`, ans: val, tol: 1.6, unit: "", isApprox: true, isPhysics: true,
      note: `2ⁿの桁数 ≈ n×0.30。${n}×0.30 = ${approxExp.toFixed(1)} → 約10${sup(Math.round(approxExp))}。正確には <b>${fmt(val)}</b>（2¹⁰≈10³ を使うと速い）` };
  }
  if (kind === "pow2ord") {
    const n = rand(10, 64);
    const exp = Math.floor(Math.log10(Math.pow(2, n)));
    return { text: `2${sup(n)} は10の何乗くらい？（指数を整数で）`, ans: exp, tol: 0, unit: "乗", isApprox: true, intAns: true, isPhysics: true,
      note: `n×log₁₀2 = ${n}×0.301 = ${(n * 0.301).toFixed(1)} → 指数 <b>${exp}</b>（2^${n} ≈ ${fmt(Math.pow(2, n))}）` };
  }
  // 合成式の指数（10の何乗）
  const m1 = rand(11, 99) / 10, e1 = rand(-3, 9);
  const m2 = rand(11, 99) / 10, e2 = rand(-3, 9);
  const op = pick(["mul", "div", "cube"]);
  let val, text;
  if (op === "mul") { val = m1 * Math.pow(10, e1) * m2 * Math.pow(10, e2); text = `${sci(m1, e1)} × ${sci(m2, e2)}`; }
  else if (op === "div") { val = m1 * Math.pow(10, e1) / (m2 * Math.pow(10, e2)); text = `${sci(m1, e1)} ÷ ${sci(m2, e2)}`; }
  else { val = Math.pow(m1 * Math.pow(10, e1), 3); text = `(${sci(m1, e1)})${sup(3)}`; }
  const exp = Math.floor(Math.log10(val));
  return { text: `${text} は10の何乗くらい？（指数を整数で）`, ans: exp, tol: 0, unit: "乗", isApprox: true, intAns: true, isPhysics: true,
    note: `仮数を1桁に丸め、指数どうしを足し引き。正確な値は ${fmt(val)} → 指数 <b>${exp}</b>` };
}

// ---------- 三角関数 ----------
function genTrig() {
  const kind = pick(["special", "smallRad", "smallDeg"]);
  if (kind === "special") {
    const t = pick([
      ["sin30°", 0.5], ["sin45°", Math.SQRT1_2], ["sin60°", Math.sqrt(3) / 2], ["sin90°", 1],
      ["cos30°", Math.sqrt(3) / 2], ["cos45°", Math.SQRT1_2], ["cos60°", 0.5],
      ["tan30°", 1 / Math.sqrt(3)], ["tan45°", 1], ["tan60°", Math.sqrt(3)],
    ]);
    return { text: `${t[0]} ≈ ?`, ans: t[1], tol: 1.08, unit: "", isApprox: true, isPhysics: true,
      note: `${t[0]} = <b>${fmt(t[1])}</b>。特殊角は暗記（√2≈1.41, √3≈1.73）。` };
  }
  if (kind === "smallRad") {
    const th = rand(3, 20) / 100;
    return { text: `sin(${th} rad) ≈ ?`, ans: Math.sin(th), tol: 1.1, unit: "", isApprox: true, isPhysics: true,
      note: `小角近似 sinθ≈θ（ラジアン）→ 約 ${th}。正確には <b>${fmt(Math.sin(th))}</b>` };
  }
  const deg = pick([1, 2, 3, 5, 10]);
  return { text: `sin${deg}° ≈ ?`, ans: Math.sin(deg * Math.PI / 180), tol: 1.15, unit: "", isApprox: true, isPhysics: true,
    note: `${deg}° = ${deg}×π/180 ≈ ${(deg * Math.PI / 180).toFixed(3)} rad、sinθ≈θ で <b>${fmt(Math.sin(deg * Math.PI / 180))}</b>` };
}

// ---------- 指数・対数 ----------
function genExpLog() {
  const kind = pick(["exp", "ln", "log10", "solve2", "rule72"]);
  if (kind === "exp") {
    const n = pick([1, 2, 3, 0.5, 0.7, -1]);
    return { text: `e^${n} ≈ ?`, ans: Math.exp(n), tol: 1.15, unit: "", isApprox: true, isPhysics: true,
      note: `e≈2.72。e^${n} = <b>${fmt(Math.exp(n))}</b>（e^0.7≈2, e²≈7.4, e³≈20 が目安）` };
  }
  if (kind === "ln") {
    const x = pick([2, 3, 5, 10, 20, 100, 1000]);
    return { text: `ln ${x} ≈ ?`, ans: Math.log(x), tol: 1.15, unit: "", isApprox: true, isPhysics: true,
      note: `ln2≈0.69, ln10≈2.30 を使う。ln ${x} = <b>${fmt(Math.log(x))}</b>` };
  }
  if (kind === "log10") {
    const x = pick([2, 3, 5, 8, 20, 50, 200, 5000]);
    return { text: `log₁₀ ${x} ≈ ?`, ans: Math.log10(x), tol: 1.12, unit: "", isApprox: true, isPhysics: true,
      note: `log2≈0.30, log3≈0.48, log5≈0.70 の組合せ。log₁₀ ${x} = <b>${fmt(Math.log10(x))}</b>` };
  }
  if (kind === "solve2") {
    const target = pick([100, 1000, 1e6, 1e9]);
    return { text: `2^x = ${fmt(target)} のとき x ≈ ?`, ans: Math.log2(target), tol: 1.1, unit: "", isApprox: true, isPhysics: true,
      note: `x = log₂(${fmt(target)}) = log₁₀ ÷ 0.30。2¹⁰≈10³ より <b>${fmt(Math.log2(target))}</b>` };
  }
  const rate = pick([2, 3, 4, 6, 8, 9, 12]);
  return { text: `年利${rate}%で元本が2倍になるのは約何年？`, ans: 72 / rate, tol: 1.2, unit: "年", isApprox: true, isPhysics: true,
    note: `72の法則: 72 ÷ ${rate} = <b>${fmt(72 / rate)} 年</b>（ln2≈0.69 の近似）` };
}

// ---------- 平方根・立方根 ----------
function genRoot() {
  const kind = pick(["sqrtSmall", "sqrtSci", "cbrtSmall", "cbrtSci", "concept"]);
  if (kind === "sqrtSmall") {
    const n = pick([2, 3, 5, 6, 7, 8, 10, 20, 50, 200]);
    return { text: `√${n} ≈ ?`, ans: Math.sqrt(n), tol: 1.1, unit: "", isApprox: true, isPhysics: true,
      note: `√2≈1.41, √3≈1.73, √10≈3.16 を軸に。√${n} = <b>${fmt(Math.sqrt(n))}</b>` };
  }
  if (kind === "sqrtSci") {
    const m = rand(11, 99) / 10, e = rand(2, 12);
    const val = m * Math.pow(10, e);
    return { text: `√(${sci(m, e)}) ≈ ?`, ans: Math.sqrt(val), tol: 1.2, unit: "", isApprox: true, isPhysics: true,
      note: `指数が奇数なら1つ借りて偶数に。例: √(a×10^odd)=√(10a)×10^((odd−1)/2)。正確には <b>${fmt(Math.sqrt(val))}</b>` };
  }
  if (kind === "cbrtSmall") {
    const n = pick([2, 3, 5, 10, 20, 100]);
    return { text: `∛${n} ≈ ?`, ans: Math.cbrt(n), tol: 1.12, unit: "", isApprox: true, isPhysics: true,
      note: `∛2≈1.26, ∛10≈2.15。∛${n} = <b>${fmt(Math.cbrt(n))}</b>` };
  }
  if (kind === "cbrtSci") {
    const e = pick([3, 6, 9, 7, 8]);
    const m = pick([1, 2, 8, 27]);
    const val = m * Math.pow(10, e);
    return { text: `∛(${sci(m, e)}) ≈ ?`, ans: Math.cbrt(val), tol: 1.2, unit: "", isApprox: true, isPhysics: true,
      note: `指数を3の倍数に寄せる。∛(10³)=10, ∛(10⁶)=10²。正確には <b>${fmt(Math.cbrt(val))}</b>` };
  }
  const c = pick([
    ["半径が2倍になると球の体積は何倍？", 8, "倍", "体積は半径の3乗 → 2³ = 8倍"],
    ["半径が3倍になると球の体積は何倍？", 27, "倍", "3³ = 27倍"],
    ["面積が9倍になると1辺は何倍？", 3, "倍", "√9 = 3倍"],
    ["体積が1000倍になると1辺は何倍？", 10, "倍", "∛1000 = 10倍"],
    ["体積1 Lの立方体の1辺は約何cm？", 10, "cm", "∛1000 cm³ = 10 cm"],
  ]);
  return { text: c[0], ans: c[1], tol: 1.1, unit: c[2], isApprox: true, isPhysics: true, note: `<b>${c[3]}</b>` };
}

function renderMentalSetup() {
  const ops = [["add","たし算"],["sub","ひき算"],["mul","かけ算"],["div","わり算"],["dd","二桁の九九"],["mix","ミックス"]];
  const lvls = [["easy","かんたん"],["normal","ふつう"],["hard","むずかしい"]];
  $("#main").innerHTML = `
    <div class="card">
      <h2>暗算練習（全10問）</h2>
      <div class="row"><span class="label">種類</span>
        ${ops.map(([v,l]) => `<button class="chip ${mentalOp===v?"sel":""}" data-op="${v}">${l}</button>`).join("")}
      </div>
      <div class="row"><span class="label">レベル</span>
        ${lvls.map(([v,l]) => `<button class="chip ${mentalLevel===v?"sel":""}" data-lvl="${v}">${l}</button>`).join("")}
      </div>
      <button class="start-btn" id="start">スタート</button>
      <p class="hint">Enterキーで解答できます。正確に、速く！</p>
    </div>`;
  document.querySelectorAll("[data-op]").forEach(b => b.onclick = () => { mentalOp = b.dataset.op; renderMentalSetup(); });
  document.querySelectorAll("[data-lvl]").forEach(b => b.onclick = () => { mentalLevel = b.dataset.lvl; renderMentalSetup(); });
  $("#start").onclick = startMental;
}

function renderApproxSetup() {
  $("#main").innerHTML = `
    <div class="card">
      <h2>近似計算（全8問）</h2>
      <div class="row"><span class="label">カテゴリ</span>
        ${APPROX_CATS.map(([v, l]) => `<button class="chip ${approxCat === v ? "sel" : ""}" data-cat="${v}">${l}</button>`).join("")}
      </div>
      <p class="muted">答えが正解の <b>±10%〜数倍以内</b>（問題による）なら正解。オーダー問題は指数を整数で答えます。</p>
      <p class="muted">入力例: <code>500</code> / <code>3.2e5</code> / <code>3.2×10^5</code> / <code>0.5</code></p>
      <button class="start-btn" id="start">スタート</button>
    </div>`;
  document.querySelectorAll("[data-cat]").forEach(b => b.onclick = () => { approxCat = b.dataset.cat; renderApproxSetup(); });
  $("#start").onclick = startApprox;
}

// ---------- quiz flow ----------
function startMental() {
  const qs = [];
  for (let i = 0; i < 10; i++) qs.push(genMental(mentalOp, mentalLevel));
  quiz = { mode: "mental", questions: qs, idx: 0, results: [], streak: 0 };
  showQuestion();
}

function makeApproxQ(cat, used) {
  switch (cat) {
    case "phys":  return genFromList(PHYS, used.phys);
    case "chem":  return genFromList(CHEM, used.chem);
    case "bio":   return genFromList(BIO, used.bio);
    case "order": return Math.random() < 0.4 ? genNotation() : genOrder();
    case "trig":  return genTrig();
    case "explog": return genExpLog();
    case "root":  return genRoot();
    case "prob":  return genFromList(PROB, used.prob);
    default: { // mix — pick a random category each question
      const c = pick(["phys", "chem", "bio", "order", "trig", "explog", "root", "prob"]);
      return makeApproxQ(c, used);
    }
  }
}

function startApprox() {
  const used = { phys: new Set(), chem: new Set(), bio: new Set(), prob: new Set() };
  const qs = [];
  for (let i = 0; i < 8; i++) qs.push(makeApproxQ(approxCat, used));
  quiz = { mode: "approx", questions: qs, idx: 0, results: [], streak: 0 };
  showQuestion();
}

function showQuestion() {
  const q = quiz.questions[quiz.idx];
  const n = quiz.questions.length;
  $("#main").innerHTML = `
    <div class="card">
      <div class="quiz-top">
        <span>第 ${quiz.idx + 1} / ${n} 問</span>
        <span id="timer">0.0 s</span>
      </div>
      <div class="progressbar"><div style="width:${(quiz.idx / n) * 100}%"></div></div>
      <div class="qtext ${q.isPhysics ? "small" : ""}">${q.text}${q.isApprox && !q.isPhysics ? "" : ""}</div>
      <div class="answer-row">
        <input id="ans" type="text" inputmode="${q.intAns ? "numeric" : (q.isApprox ? "text" : "numeric")}" enterkeyhint="done" autocomplete="off" placeholder="${q.intAns ? "例: 15" : (q.isApprox ? "例: 3.2e5" : "答え")}">
        ${q.unit ? `<span class="unit">${q.unit}</span>` : ""}
        <button id="submit">解答</button>
      </div>
      ${q.intAns ? `<p class="hint">指数（10の何乗）を整数で。ぴったり正解のみ○</p>`
        : q.isApprox ? `<p class="hint">近似でOK（正解の${q.tol <= 1.15 ? "±10%" : q.tol <= 1.3 ? "±30%" : "数倍"}以内で正解）</p>` : ""}
      <div id="fb"></div>
    </div>`;
  quiz.qStart = performance.now();
  quiz.timerId = setInterval(() => {
    const t = (performance.now() - quiz.qStart) / 1000;
    const el = $("#timer");
    if (el) el.textContent = t.toFixed(1) + " s";
  }, 100);
  const input = $("#ans");
  input.focus();
  input.addEventListener("keydown", e => { if (e.key === "Enter") submitAnswer(); });
  $("#submit").onclick = submitAnswer;
}

function submitAnswer() {
  const q = quiz.questions[quiz.idx];
  const raw = $("#ans").value;
  const val = parseNum(raw);
  if (isNaN(val)) { $("#ans").focus(); return; }
  clearInterval(quiz.timerId);
  const ms = performance.now() - quiz.qStart;

  let ok;
  if (q.intAns) {
    ok = Math.round(val) === q.ans; // オーダー問題: 指数がぴったり
  } else if (q.isApprox) {
    ok = val !== 0 && Math.sign(val) === Math.sign(q.ans) &&
         Math.max(Math.abs(val / q.ans), Math.abs(q.ans / val)) <= q.tol;
  } else {
    ok = val === q.ans;
  }
  quiz.results.push({ q: q.text, ans: q.ans, given: raw, ok, ms, unit: q.unit || "" });
  quiz.streak = ok ? quiz.streak + 1 : 0;
  const store = loadStore();
  if (quiz.streak > store.bestStreak) { store.bestStreak = quiz.streak; saveStore(store); }

  $("#ans").disabled = true;
  $("#submit").disabled = true;

  const fb = $("#fb");
  if (q.isApprox) {
    fb.innerHTML = `
      <div class="feedback ${ok ? "ok" : "ng"}">
        <span class="mark">${ok ? "○" : "✕"}</span>
        ${ok ? "正解！" : "残念"}　正解: <b>${fmt(q.ans)}${q.unit ? " " + q.unit : ""}</b>
      </div>
      <div class="note">${q.note}</div>
      <button class="next-btn" id="next">${quiz.idx + 1 < quiz.questions.length ? "次の問題へ (Enter)" : "結果を見る (Enter)"}</button>`;
    const nextBtn = $("#next");
    nextBtn.onclick = nextQuestion;
    nextBtn.focus();
    setTimeout(() => document.addEventListener("keydown", enterNext), 0);
  } else if (!ok || ms > 5000) {
    // 間違えたか時間がかかった → コツを表示してじっくり読ませる
    fb.innerHTML = `
      <div class="feedback ${ok ? "ok" : "ng"}">
        <span class="mark">${ok ? "○" : "✕"}</span>
        ${ok ? `正解！ただ ${(ms / 1000).toFixed(1)} 秒。コツで時短:` : `正解は <b>${q.ans}</b>`}
      </div>
      ${q.tip ? `<div class="note">💡 ${q.tip}</div>` : ""}
      <button class="next-btn" id="next">${quiz.idx + 1 < quiz.questions.length ? "次の問題へ (Enter)" : "結果を見る (Enter)"}</button>`;
    const nextBtn = $("#next");
    nextBtn.onclick = nextQuestion;
    nextBtn.focus();
    // 解答のEnterがバブルして即発火しないよう、登録は次のイベントループで
    setTimeout(() => document.addEventListener("keydown", enterNext), 0);
  } else {
    fb.innerHTML = `
      <div class="feedback ok">
        <span class="mark">○</span>
        正解！
      </div>`;
    setTimeout(nextQuestion, 700);
  }
}

function enterNext(e) {
  if (e.key === "Enter") {
    e.preventDefault(); // ボタンのデフォルト発火と重なって二重進行するのを防ぐ
    document.removeEventListener("keydown", enterNext);
    nextQuestion();
  }
}

function nextQuestion() {
  document.removeEventListener("keydown", enterNext);
  if (!quiz) return;
  quiz.idx++;
  if (quiz.idx < quiz.questions.length) showQuestion();
  else finishQuiz();
}

function finishQuiz() {
  const rs = quiz.results;
  const correct = rs.filter(r => r.ok).length;
  const avgMs = rs.reduce((s, r) => s + r.ms, 0) / rs.length;
  const store = loadStore();
  store.sessions.push({ d: todayStr(), mode: quiz.mode, correct, total: rs.length, avgMs: Math.round(avgMs) });
  saveStore(store);

  const modeLabel = quiz.mode === "mental" ? "暗算" : "近似計算";
  $("#main").innerHTML = `
    <div class="card">
      <h2>${modeLabel} — 結果</h2>
      <div class="score-big">${correct} / ${rs.length}</div>
      <div class="score-sub">平均解答時間 ${(avgMs / 1000).toFixed(1)} 秒</div>
      <div class="review">
        ${rs.map(r => `<div>
          <span class="q">${r.q.length > 40 ? r.q.slice(0, 38) + "…" : r.q}</span>
          <span class="${r.ok ? "r-ok" : "r-ng"}">${r.ok ? "○" : "✕ (" + r.given + " → " + fmt(r.ans) + ")"}</span>
        </div>`).join("")}
      </div>
      <div style="display:flex; gap:8px; margin-top:16px;">
        <button class="start-btn" id="again">もう一度</button>
        <button class="next-btn" id="tostats">進捗を見る</button>
      </div>
    </div>`;
  const mode = quiz.mode;
  quiz = null;
  $("#again").onclick = () => mode === "mental" ? startMental() : startApprox();
  $("#tostats").onclick = () => switchTab("stats");
}

// ---------- backup (export / import) ----------
function backupCardHTML() {
  return `
    <div class="card">
      <h2>バックアップ</h2>
      <p class="muted">記録をJSONファイルとして保存・復元できます。別の端末への引っ越しにも使えます（読み込みは既存の記録と合体し、重複は自動でスキップ）。</p>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="chip" id="export">書き出し（ダウンロード）</button>
        <button class="chip" id="import">読み込み（復元）</button>
        <input type="file" id="importfile" accept=".json,application/json" style="display:none">
      </div>
      <p class="hint" id="backup-msg"></p>
    </div>`;
}

function bindBackupHandlers() {
  $("#export").onclick = () => {
    const blob = new Blob([JSON.stringify(loadStore(), null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `anzan-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    $("#backup-msg").textContent = "バックアップファイルをダウンロードしました。";
  };
  $("#import").onclick = () => $("#importfile").click();
  $("#importfile").onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const result = mergeBackup(reader.result);
      if (result.error) {
        $("#backup-msg").textContent = "読み込めませんでした: " + result.error;
      } else {
        renderStats();
        $("#backup-msg").textContent = `読み込みました（セッション${result.added}件を追加、重複${result.skipped}件をスキップ）。`;
      }
    };
    reader.readAsText(file);
  };
}

function mergeBackup(text) {
  let data;
  try { data = JSON.parse(text); }
  catch { return { error: "JSONとして読めないファイルです" }; }
  if (!data || !Array.isArray(data.sessions)) return { error: "このアプリのバックアップ形式ではありません" };
  const cur = loadStore();
  const seen = new Set(cur.sessions.map(s => JSON.stringify(s)));
  let added = 0, skipped = 0;
  for (const s of data.sessions) {
    const valid = s && typeof s.d === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s.d) &&
      (s.mode === "mental" || s.mode === "approx") &&
      typeof s.correct === "number" && typeof s.total === "number" && typeof s.avgMs === "number";
    if (!valid) { skipped++; continue; }
    const rec = { d: s.d, mode: s.mode, correct: s.correct, total: s.total, avgMs: s.avgMs };
    const key = JSON.stringify(rec);
    if (seen.has(key)) { skipped++; continue; }
    cur.sessions.push(rec);
    seen.add(key);
    added++;
  }
  cur.sessions.sort((a, b) => a.d < b.d ? -1 : a.d > b.d ? 1 : 0);
  cur.bestStreak = Math.max(cur.bestStreak || 0, typeof data.bestStreak === "number" ? data.bestStreak : 0);
  saveStore(cur);
  return { added, skipped };
}

// ---------- stats ----------
function renderStats() {
  const store = loadStore();
  const ss = store.sessions;
  if (ss.length === 0) {
    $("#main").innerHTML = `<div class="card"><h2>進捗</h2>
      <p class="muted">まだ記録がありません。まずは1セッション解いてみましょう！</p></div>` + backupCardHTML();
    bindBackupHandlers();
    return;
  }
  const agg = mode => {
    const m = ss.filter(s => s.mode === mode);
    const total = m.reduce((s, x) => s + x.total, 0);
    const correct = m.reduce((s, x) => s + x.correct, 0);
    const avg = m.length ? m.reduce((s, x) => s + x.avgMs, 0) / m.length : 0;
    return { n: m.length, total, correct, acc: total ? Math.round(correct / total * 100) : 0, avg };
  };
  const me = agg("mental"), ap = agg("approx");

  // last 14 days chart
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    const dayS = ss.filter(s => s.d === key);
    days.push({
      label: (d.getMonth()+1) + "/" + d.getDate(),
      total: dayS.reduce((s, x) => s + x.total, 0),
      correct: dayS.reduce((s, x) => s + x.correct, 0),
    });
  }
  const maxT = Math.max(1, ...days.map(d => d.total));
  const W = 600, H = 160, bw = W / 14;
  const bars = days.map((d, i) => {
    const hT = d.total / maxT * (H - 30);
    const hC = d.correct / maxT * (H - 30);
    const x = i * bw + 6;
    return `
      <rect x="${x}" y="${H - 20 - hT}" width="${bw - 12}" height="${hT}" fill="#334155" rx="3"/>
      <rect x="${x}" y="${H - 20 - hC}" width="${bw - 12}" height="${hC}" fill="#38bdf8" rx="3"/>
      ${d.total ? `<text x="${x + (bw-12)/2}" y="${H - 24 - hT}" fill="#94a3b8" font-size="10" text-anchor="middle">${d.total}</text>` : ""}
      <text x="${x + (bw-12)/2}" y="${H - 6}" fill="#64748b" font-size="9" text-anchor="middle">${d.label}</text>`;
  }).join("");

  const recent = ss.slice(-8).reverse();
  $("#main").innerHTML = `
    <div class="card">
      <h2>全体</h2>
      <div class="statgrid">
        <div class="stat"><div class="v">${me.total + ap.total}</div><div class="k">総回答数</div></div>
        <div class="stat"><div class="v">${store.bestStreak}</div><div class="k">最高連続正解</div></div>
        <div class="stat"><div class="v">${me.acc}%</div><div class="k">暗算 正答率（${me.total}問）</div></div>
        <div class="stat"><div class="v">${ap.acc}%</div><div class="k">近似計算 正答率（${ap.total}問）</div></div>
        <div class="stat"><div class="v">${me.n ? (me.avg/1000).toFixed(1) + "s" : "–"}</div><div class="k">暗算 平均解答時間</div></div>
        <div class="stat"><div class="v">${ap.n ? (ap.avg/1000).toFixed(1) + "s" : "–"}</div><div class="k">近似計算 平均解答時間</div></div>
      </div>
    </div>
    <div class="card">
      <h2>直近14日の回答数 <span class="muted" style="font-weight:normal;font-size:12px">（水色=正解）</span></h2>
      <div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%">${bars}</svg></div>
    </div>
    <div class="card">
      <h2>最近のセッション</h2>
      <table class="sess">
        <tr><th>日付</th><th>モード</th><th>スコア</th><th>平均時間</th></tr>
        ${recent.map(s => `<tr>
          <td>${s.d.slice(5)}</td>
          <td>${s.mode === "mental" ? "暗算" : "近似計算"}</td>
          <td>${s.correct}/${s.total}</td>
          <td>${(s.avgMs/1000).toFixed(1)}s</td>
        </tr>`).join("")}
      </table>
      <button class="danger" id="reset">記録をすべて削除</button>
    </div>` + backupCardHTML();
  bindBackupHandlers();
  $("#reset").onclick = () => {
    if (confirm("進捗の記録をすべて削除しますか？")) { localStorage.removeItem(STORE_KEY); renderStats(); }
  };
}

render();
</script>
